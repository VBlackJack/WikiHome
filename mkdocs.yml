site_name: WikiHome
theme:
  name: material
  language: fr
  icon:
    logo: material/home
  palette:
    - scheme: dracula
      toggle:
        icon: material/brightness-4
        name: Mode clair
    - scheme: dracula-light
      toggle:
        icon: material/brightness-7
        name: Mode sombre
  features:
    - navigation.expand
    - navigation.top
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.integrate
plugins:
  - search:
      separator: "[\\s\\-\\.']+"
  - tags:
      tags_file: tags.md
extra_css:
  - stylesheets/dracula.css
nav:
  - Accueil: index.md
  - Cuisine:
    - guides/cuisine/index.md
    - Fondamentaux:
      - Beurre: guides/cuisine/beurre.md
      - Huile d'Olive: guides/cuisine/huile_olive.md
      - "Qualit\xE9 des \u0152ufs": guides/cuisine/oeufs_qualite.md
      - "Mat\xE9riaux Cuisson": guides/cuisine/materiaux_cuisson.md
      - "Techniques Anti-Adh\xE9rence": guides/cuisine/techniques_antiadherence.md
      - Mythes en Cuisine: guides/cuisine/mythes_cuisine.md
      - Conservation des Aliments: guides/cuisine/conservation_aliments.md
      - Equivalences et Conversions: guides/cuisine/equivalences.md
      - Plantes Sauvages Comestibles: guides/cuisine/plantes_sauvages.md
    - Techniques de base:
      - Cuisson des Oeufs: guides/cuisine/cuisson_oeufs.md
      - Cuisson du Riz: guides/cuisine/cuisson_riz.md
      - Cuisson des Viandes: guides/cuisine/cuisson_viandes.md
      - Pomme de Terre: guides/cuisine/pomme_de_terre.md
      - Sauces de Base: guides/cuisine/sauces_bases.md
      - Sauce Nuoc Cham: guides/cuisine/nuoc_cham.md
      - Sauces Classiques (Escoffier): guides/cuisine/sauces_classiques.md
      - "P\xE2tes \xE0 Tarte": guides/cuisine/pates_a_tarte.md
      - "P\xE2te \xE0 Cr\xEApes": guides/cuisine/pate_a_crepes.md
    - Recettes:
      - "Cr\xEApes Raymond Oliver": guides/cuisine/crepes_raymond_oliver.md
      - "Cr\xEApes Paul Bocuse": guides/cuisine/crepes_paul_bocuse.md
      - "Pur\xE9e Robuchon": guides/cuisine/puree_robuchon.md
      - Lasagnes Bolognese: guides/cuisine/lasagnes_bolognese.md
      - Pain au Levain: guides/cuisine/pain_levain.md
      - Pancakes au Levain: guides/cuisine/pancakes_levain.md
      - Rouleaux de Printemps: guides/cuisine/rouleaux_de_printemps.md
      - "B\xEC Cu\u1ED1n": guides/cuisine/bi_cuon.md
  - Bricolage:
    - guides/bricolage/index.md
    - "R\xE9parations":
      - Chevilles et Fixations: guides/bricolage/chevilles_fixations.md
      - Purger un Radiateur: guides/bricolage/purger_radiateur.md
      - Changer un Joint: guides/bricolage/changer_joint.md
    - Entretien et Nettoyage:
      - Vinaigre Blanc: guides/bricolage/vinaigre_blanc.md
      - Bicarbonate de Soude: guides/bricolage/bicarbonate_soude.md
      - Citron: guides/bricolage/citron.md
      - Astuces Nettoyage: guides/bricolage/astuces_nettoyage.md
      - Plantes Medicinales: guides/bricolage/plantes_medicinales.md
  - Saisonnier:
    - guides/saisonnier/index.md
    - Montage Sapin: guides/saisonnier/montage_sapin.md
    - Specs Sapin: guides/saisonnier/specs_sapin.md
    - Checklist Vacances: guides/saisonnier/checklist_vacances.md
    - Entretien Saisonnier: guides/saisonnier/entretien_saisonnier.md
  - Admin:
    - guides/admin/index.md
    - Checklist Administrative: guides/admin/checklist_administrative.md
  - "Biblioth\xE8que":
    - bibliotheque/index.md
    - Cuisine: bibliotheque/cuisine.md
    - Plantes Medicinales: bibliotheque/plantes_medicinales.md
  - Tags: tags.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - toc:
      permalink: true
