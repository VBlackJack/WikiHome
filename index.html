<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>WikiHome 🏠</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Documentation technique de la vie domestique">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Chargement du Wiki...</div>
  <script>
    window.$docsify = {
      name: 'WikiHome 🏠',
      repo: 'https://github.com/VBlackJack/WikiHome',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: 'auto', // Activation de la recherche
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
